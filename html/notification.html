<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Point - Notification</title>

    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />

    <!-- Main CSS (navbar dll) -->
    <link href="css/main.css" rel="stylesheet" />

    <!-- Profile CSS -->
    <link rel="stylesheet" href="css/notif.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body
    style="background: #f5f7fb; font-family: &quot;Montserrat&quot;, sans-serif"
  >
    <!-- NAVBAR (SAMA KAYAK HOME2) -->
    <div class="container-fluid sticky-top bg-white shadow-sm">
      <div class="container">
        <nav class="navbar navbar-expand-lg navbar-light py-3">
          <a class="navbar-brand">
            <img src="icon/logo.png" style="height: 40px" />
          </a>

          <button
            class="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto align-items-center">
              <a href="/home2" class="nav-link">Home</a>
              <a href="/games2" class="nav-link">Games</a>
              <a href="/dashboard" class="nav-link">Dashboard</a>

              <!-- Notification -->
              <div class="ms-3 d-flex align-items-center">
                <img src="icon/Profilee.png" class="profile-img" />
                <span class="ms-2 fw-semibold">{{ username }}</span>

                <!-- LOGOUT BUTTON -->
                <a href="/logout" class="ms-3">
                  <img src="icon/icon_logout.png" class="logout-icon" />
                </a>
              </div>
            </div>
          </div>
        </nav>
      </div>
    </div>

    <main class="content-wrapper">
      <aside class="sidebar">
        <div class="side-item">
          <a href="/profile">
            <img src="icon/profil.png" alt="Profile" />
          </a>
        </div>
        <div class="side-item active">
          <a href="/notification">
            <img src="icon/notif.png" alt="Notification" />
          </a>
        </div>
        <div class="side-item">
          <a href="/privacy">
            <img src="icon/privacy.png" alt="Security" />
          </a>
        </div>
      </aside>

      <section class="notif-card">
        <div class="card-header">
          <h1>Notifications</h1>
        </div>

        <div class="notification-list">
          <div class="notification-item">
            <div class="notif-content">
              <h3>Notifications 1</h3>
              <p>Descriptions 1</p>
            </div>
            <div class="line-separator"></div>
          </div>

          <div class="notification-item">
            <div class="notif-content">
              <h3>Notifications 2</h3>
              <p>Descriptions 2</p>
            </div>
            <div class="line-separator"></div>
          </div>

          <div class="notification-item">
            <div class="notif-content">
              <h3>Notifications 3</h3>
              <p>Descriptions 3</p>
            </div>
            <div class="line-separator"></div>
          </div>

          <div class="notification-item">
            <div class="notif-content">
              <h3>Notifications 4</h3>
              <p>Descriptions 4</p>
            </div>
            <div class="line-separator"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
