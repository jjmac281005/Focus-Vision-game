<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pencil Push Up</title>
<link rel="stylesheet" href="css/playgame.css">
<style>
    #webcam-feed {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        border-radius: 12px;
    }
    .game-area {
        background-color: #b9c9d8;
        overflow: hidden;
        position: relative;
    }
    #start-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.5);
        z-index: 10;
        border-radius: 12px;
    }
    #start-btn {
        padding: 16px 48px;
        font-size: 22px;
        font-weight: bold;
        background: #4CAF50;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
    }
    #start-btn:hover { background: #45a049; }
</style>
</head>

<body>

<div class="wrapper">
    <div class="card">
        <div class="top-section">
            <div class="left">
                <h2>Pencil Push Up</h2>
                <div class="buttons">
                    <button id="pause-btn" class="btn">
                        <img src="icon/Pause.png" class="pause-icon"> Pause
                    </button>
                    <button id="reset-btn" class="btn">
                        <img src="icon/Reset.png" class="reset-icon"> Reset
                    </button>
                </div>
            </div>
            <div class="right">
                <div class="user">Welcome, {{username}}</div>
                <div class="score">Score : 0</div>
            </div>
        </div>

        <div class="game-area">
            <div id="start-overlay">
                <button id="start-btn">&#9654; Start Game</button>
            </div>

            <!-- 🔥 TAMBAHKAN INI -->
            <div id="timer" class="timer">Time: 30</div>

            <img id="webcam-feed" alt="Webcam Feed">
        </div>

        <div class="instructions">
            <ul>
                <li>Follow the red circles with your eyes only.</li>
                <li>Keep your head still and maintain good posture.</li>
                <li>Practice for 3-5 minutes daily for best results.</li>
            </ul>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.js"></script>
<script>
const socket = io();

let gameStarted = false;
let timeLeft = 30;
let timerInterval = null;
let currentScore = 0;
let isPaused = false;

// ======================
// SCORE UPDATE
// ======================
socket.on("score_update", function(data) {
    if (!isPaused && data.game === "pencil") {
        currentScore = data.score;
        document.querySelector(".score").textContent = "Score : " + currentScore;
    }
});

// ======================
// GAME OVER (dari backend)
// ======================
socket.on("game_over", function(data) {
    if (gameStarted && data.game === "pencil") {
        endGame();
    }
});

// ======================
// START GAME
// ======================
document.getElementById("start-btn").addEventListener("click", function() {
    document.getElementById("start-overlay").style.display = "none";
    startGame();
});

function startGame() {
    if (gameStarted) return;
    
    socket.emit("reset_pencil"); // 🔥 paksa reset dulu

    timeLeft = 30;
    gameStarted = true;
    currentScore = 0;
    isPaused = false;

    document.querySelector(".score").textContent = "Score : 0";
    document.getElementById("timer").textContent = "Time: 30";

    socket.emit("start_pencil", {
        email: "{{ session.user }}"
    });

    const webcam = document.getElementById("webcam-feed");

    webcam.src = "/video_feed/pencil?" + Date.now();
    startTimer(); // langsung panggil
}

// ======================
// TIMER
// ======================
function startTimer() {
    const timerElement = document.getElementById("timer");

    timerInterval = setInterval(function() {
        if (!isPaused) {
            timeLeft--;
            timerElement.textContent = "Time: " + timeLeft;

            if (timeLeft <= 0) {
                endGame();
            }
        }
    }, 1000);
}

// ======================
// END GAME (central logic)
// ======================
function endGame() {
    clearInterval(timerInterval);

    // simpan score
    fetch("/save_score", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            score: currentScore,
            game_name: "pencil_push_up"
        })
    })
    .finally(() => {
        window.location.href =
            "/result_pencil_push_up?score=" + currentScore +
            "&time=" + (30 - timeLeft);
    });
}

// ======================
// PAUSE
// ======================
document.getElementById("pause-btn").addEventListener("click", function() {
    if (!gameStarted) return;

    isPaused = !isPaused;

    // 🔥 kirim ke backend
    socket.emit("pause_pencil", {
        paused: isPaused
    });

    if (isPaused) {
        this.innerHTML = '<img src="icon/icon_play.png" class="pause-icon"> Resume';
    } else {
        this.innerHTML = '<img src="icon/Pause.png" class="pause-icon"> Pause';
    }
});

// ======================
// RESET
// ======================
document.getElementById("reset-btn").addEventListener("click", function() {
    clearInterval(timerInterval);

    socket.emit("reset_pencil"); // 🔥 penting

    gameStarted = false;
    isPaused = false;
    timeLeft = 30;
    currentScore = 0;

    document.querySelector(".score").textContent = "Score : 0";
    document.getElementById("timer").textContent = "Time: 30";

    document.getElementById("webcam-feed").src = "";
    document.getElementById("start-overlay").style.display = "flex";

    document.getElementById("pause-btn").innerHTML =
        '<img src="icon/Pause.png" class="pause-icon"> Pause';
});
</script>

</body>
</html>
